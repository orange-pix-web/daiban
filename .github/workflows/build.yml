name: Build and release Windows app

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    permissions:
      contents: write

    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 我的待办 v__VERSION__
          releaseBody: |
            我的待办桌面版安装包。

            Windows 用户请下载 setup.exe 安装。
          releaseDraft: false
          prerelease: false
          args: --bundles nsis